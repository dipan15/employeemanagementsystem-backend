server.port=8090
spring.application.name=demo
spring.datasource.url=jdbc:mysql://localhost:3306/employee_db
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Enable basic SQL query logging (shows '?' placeholders)
logging.level.org.hibernate.SQL=DEBUG

# Enable logging of the actual parameter values bound to the placeholders
logging.level.org.hibernate.orm.jdbc.bind=TRACE

# Optional: Format the SQL for better readability
spring.jpa.properties.hibernate.format_sql=true

# Sets the log level for binding parameters to TRACE (shows the actual values)
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
